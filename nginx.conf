server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SEO: compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 500;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # robots.txt & sitemap
    location = /robots.txt {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }
    location = /sitemap.xml {
        access_log off;
        add_header Content-Type "application/xml";
        add_header Cache-Control "public, max-age=86400";
    }

    # Static assets: long cache
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff2?)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # HTML: short cache
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect common bot-probed paths to root (avoid 404 noise in logs)
    location = /favicon.ico {
        return 204;
        access_log off;
    }
}
